services:
  - type: web
    name: plant-disease-api
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"           # <-- must be major.minor.patch
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TORCH_HOME
        value: "/opt/render/project/.torch"
      - key: MODEL_PATH
        value: "saved_model/plant_disease_model.pth"
      - key: REQUIRE_API_KEY
        value: "true"
      - key: API_KEY_HEADER_NAME
        value: "x-api-key"
      # Do NOT put the actual API_KEY here in git; set it in the Render UI